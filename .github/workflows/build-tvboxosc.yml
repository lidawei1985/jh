name: Build hardened TVBoxOSC

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-tvboxosc.yml'
      - 'tvboxosc-build/**'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out build scripts
        uses: actions/checkout@v4

      - name: Check out preserved upstream fork
        uses: actions/checkout@v4
        with:
          repository: no1412/TVBoxOSC
          ref: e8c12d2bf408feb129857e577803d918e613482f
          path: source

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Harden source
        shell: pwsh
        working-directory: source
        run: ../tvboxosc-build/harden.ps1

      - name: Build debug APK
        working-directory: source
        run: |
          chmod +x gradlew
          set -o pipefail
          ./gradlew --no-daemon --stacktrace :app:assembleDebug 2>&1 | tee ../gradle-build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tvboxosc-gradle-log
          path: gradle-build.log
          if-no-files-found: warn
          retention-days: 14

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tvboxosc-hardened-debug
          path: source/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
